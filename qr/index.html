<div class="page">
    <div class="blind"></div>
    <header class="header">
        <div class="wrap">
            <div class="burger-container">
                <span class="burger__label">menu</span>
                <div class="burger">
                    <div class="burger__icon burger__icon_top"></div>
                    <div class="burger__icon burger__icon_bottom"></div>
                </div>
            </div>
            <h1 class="logo"><a href="../">Denys<br>Tarabanov</a></h1>
        </div>
        <div class="header__bg"></div>
    </header>
    <div class="page__inner" id="smooth-wrapper">
        <div id="smooth-content">
            <section class="section hero" id="generator">
                <div class="wrap">
<!--                    <div class="hero__label">Forever Free QR Code Generator</div>-->
                    <div class="qr-container from-blur">
                        <div class="qr-panel">
                            <div class="qr-layout">
                                <div class="qr-layout__main">
                                    <div class="qr-builder">
                                        <fieldset class="qr-switch" aria-label="QR content type">

                                            <label class="qr-switch__option">
                                                <input class="qr-switch__input" type="radio" name="qr-mode" value="text" checked>
                                                <span class="qr-switch__text">Link / Text</span>
                                            </label>

                                            <label class="qr-switch__option">
                                                <input class="qr-switch__input" type="radio" name="qr-mode" value="vcard">
                                                <span class="qr-switch__text">vCard</span>
                                            </label>
                                        </fieldset>

                                        <div class="qr-builder__panel" data-qr-mode-panel="text">
                                            <label class="qr-field qr-field_large" for="qr-text-value">
                                                <input class="qr-field__input qr-field__input_large" id="qr-text-value" name="qr-text-value" type="text" placeholder="https://example.com" spellcheck="false" enterkeyhint="go" autocomplete="off">
                                                <span class="qr-field__hint">Type text, url, or smthng and press enter ⏎</span>
                                            </label>
                                        </div>

                                        <div class="qr-builder__panel" data-qr-mode-panel="vcard" hidden>
                                            <div class="qr-grid">
                                                <label class="qr-field" for="qr-vcard-first-name">
                                                    <span class="qr-field__label">First Name</span>
                                                    <input class="qr-field__input" id="qr-vcard-first-name" name="qr-vcard-first-name" type="text" autocomplete="given-name">
                                                </label>

                                                <label class="qr-field" for="qr-vcard-last-name">
                                                    <span class="qr-field__label">Last Name</span>
                                                    <input class="qr-field__input" id="qr-vcard-last-name" name="qr-vcard-last-name" type="text" autocomplete="family-name">
                                                </label>

                                                <label class="qr-field" for="qr-vcard-phone">
                                                    <span class="qr-field__label">Phone</span>
                                                    <input class="qr-field__input" id="qr-vcard-phone" name="qr-vcard-phone" type="tel" autocomplete="tel">
                                                </label>

                                                <label class="qr-field" for="qr-vcard-email">
                                                    <span class="qr-field__label">Email</span>
                                                    <input class="qr-field__input" id="qr-vcard-email" name="qr-vcard-email" type="email" autocomplete="email">
                                                </label>

                                                <label class="qr-field" for="qr-vcard-company">
                                                    <span class="qr-field__label">Company</span>
                                                    <input class="qr-field__input" id="qr-vcard-company" name="qr-vcard-company" type="text" autocomplete="organization">
                                                </label>

                                                <label class="qr-field" for="qr-vcard-title">
                                                    <span class="qr-field__label">Job Title</span>
                                                    <input class="qr-field__input" id="qr-vcard-title" name="qr-vcard-title" type="text" autocomplete="organization-title">
                                                </label>

                                                <label class="qr-field" for="qr-vcard-website">
                                                    <span class="qr-field__label">Website</span>
                                                    <input class="qr-field__input" id="qr-vcard-website" name="qr-vcard-website" type="url" autocomplete="url">
                                                </label>

                                                <label class="qr-field qr-field_full" for="qr-vcard-address">
                                                    <span class="qr-field__label">Address</span>
                                                    <input class="qr-field__input" id="qr-vcard-address" name="qr-vcard-address" type="text" autocomplete="street-address">
                                                </label>

                                                <label class="qr-field qr-field_full" for="qr-vcard-note">
                                                    <span class="qr-field__label">Note</span>
                                                    <input class="qr-field__input" id="qr-vcard-note" name="qr-vcard-note" type="text">
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <aside class="qr-preview" aria-live="polite">
                                    <div class="qr-preview__card">
                                        <div class="qr-preview__canvas" data-qr-output>
                                            <div class="qr-preview__placeholder">Enter text or fill the vCard fields to generate a QR code.</div>
                                        </div>
                                    </div>

                                    <div>
                                        <div class="qr-preview__status" data-qr-status>Waiting for content.</div>
                                    </div>

                                    <div class="qr-preview__actions">
                                        <a class="qr-button qr-button_secondary" data-qr-download href="#" download="qr-code.png" hidden>Download PNG 1500×1500</a>
                                    </div>
                                </aside>
                            </div>
                        </div>
                    </div>

                        <source src="../img/bg-video-2.mp4" type="video/mp4">
